spring.datasource.url=jdbc:mysql://localhost:3306/plotassistant?useUnicode=true&characterEncoding=utf8&serverTimezone=UTC
spring.datasource.username=你的用户名
spring.datasource.password=你的密码
spring.datasource.driver-class-name=com.mysql.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# OpenAI 配置
# API Key：从环境变量读取，或写死默认值（开发环境）
ai.openai.api-key=${OPENAI_API_KEY:这里填写token}

# 基础URL：可替换为 Azure、Claude 代理或其他兼容 OpenAI API 的厂商
# 例如： https://api.anthropic.com/v1 （如果支持 OpenAI 格式）
ai.openai.base-url=${OPENAI_BASE_URL:这里填写url}

# 模型名称：可替换为 gpt-3.5-turbo, gpt-4-turbo, gpt-4o 等
ai.openai.model=${OPENAI_MODEL:这里填写模型}



# 设置日志级别
logging.level.root=INFO
logging.level.com.example=DEBUG

# 设置日志文件的路径和文件名
logging.file.name=logs/app.log

# 设置日志文件的最大大小
logging.file.max-size=10MB

# 设置日志文件的最大历史数量
logging.file.max-history=30

# 设置日志的模式（CONSOLE、FILE、NONE）
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n
